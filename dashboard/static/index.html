<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hermes Trading Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<script src="https://unpkg.com/lightweight-charts@4.2.1/dist/lightweight-charts.standalone.production.js"></script>
<style>
:root {
  --bg: #0d0e12; --bg2: #131620; --bg3: #1a1e2b;
  --card: #161a25; --card-hover: #1c2032;
  --border: #1e2338; --border-light: #292e45;
  --text: #e2e6f0; --text-dim: #787d96; --text-muted: #555a75;
  --green: #22c55e; --green-bg: rgba(34,197,94,0.1); --green-border: rgba(34,197,94,0.25);
  --red: #ef4444; --red-bg: rgba(239,68,68,0.1); --red-border: rgba(239,68,68,0.25);
  --blue: #3b82f6; --cyan: #22d3ee; --yellow: #eab308; --purple: #a855f7; --orange: #f97316;
  --rsi-color: #a855f7; --macd-color: #22d3ee; --stoch-color: #f97316;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Inter,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
.container { max-width:1600px; margin:0 auto; padding:12px; }
.header { display:flex; justify-content:space-between; align-items:center; padding:10px 0 14px; }
.header-left { display:flex; align-items:center; gap:14px; }
.header-left h1 { font-size:20px; font-weight:700; background:linear-gradient(135deg,#3b82f6,#22d3ee); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.header-left .subtitle { color:var(--text-dim); font-size:12px; }
.header-right { display:flex; align-items:center; gap:12px; font-size:12px; color:var(--text-dim); }
.header-right .update-time { background:var(--card); padding:4px 12px; border-radius:6px; border:1px solid var(--border); }
.account-bar { display:grid; grid-template-columns:repeat(auto-fit,minmax(120px,1fr)); gap:8px; margin-bottom:14px; }
.acct-item { background:var(--card); border:1px solid var(--border); border-radius:8px; padding:10px 12px; text-align:center; }
.acct-item .label { font-size:10px; text-transform:uppercase; letter-spacing:.5px; color:var(--text-muted); margin-bottom:2px; }
.acct-item .value { font-size:16px; font-weight:700; }
.acct-item .value.green { color:var(--green); }
.acct-item .value.red { color:var(--red); }
.acct-item .value.blue { color:var(--blue); }
.main-grid { display:grid; grid-template-columns:1fr 340px; gap:12px; margin-bottom:14px; }
@media(max-width:1100px) { .main-grid { grid-template-columns:1fr; } }
.chart-section { background:var(--card); border:1px solid var(--border); border-radius:10px; overflow:hidden; }
.chart-header { display:flex; justify-content:space-between; align-items:center; padding:10px 14px 0; font-size:12px; color:var(--text-dim); }
.chart-header .pair-selector { display:flex; gap:4px; flex-wrap:wrap; }
.chart-header .pair-btn { background:transparent; border:1px solid var(--border); border-radius:4px; padding:2px 8px; font-size:11px; cursor:pointer; color:var(--text-dim); transition:.15s; }
.chart-header .pair-btn:hover { background:var(--bg3); color:var(--text); }
.chart-header .pair-btn.active { background:var(--blue); border-color:var(--blue); color:#fff; }
#candlestick { width:100%; height:380px; }
.osc-panels { display:flex; flex-direction:column; gap:10px; height:100%; }
.osc-panel { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:10px; flex:1; min-height:0; }
.osc-panel .title { font-size:11px; font-weight:600; color:var(--text-dim); text-transform:uppercase; letter-spacing:.5px; margin-bottom:3px; }
.osc-panel .value { font-size:18px; font-weight:700; margin-bottom:2px; }
.osc-panel .canvas { height:70px; width:100%; }
.strat-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:14px; }
@media(max-width:800px) { .strat-grid { grid-template-columns:1fr; } }
.strat-card { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:14px; }
.strat-card .hdr { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
.strat-card .hdr h3 { font-size:14px; font-weight:600; }
.strat-card .hdr .badge { font-size:10px; padding:2px 8px; border-radius:4px; font-weight:600; }
.strat-card .hdr .badge.active { background:var(--green-bg); color:var(--green); border:1px solid var(--green-border); }
.strat-card .hdr .badge.idle { background:transparent; color:var(--text-muted); border:1px solid var(--border); }
.strat-card .stat-row { display:flex; justify-content:space-between; font-size:12px; padding:4px 0; border-bottom:1px solid var(--border); }
.strat-card .stat-row:last-child { border-bottom:none; }
.strat-card .stat-row .lbl { color:var(--text-dim); }
.strat-card .stat-row .val { font-weight:600; }
.bottom-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:14px; }
@media(max-width:800px) { .bottom-grid { grid-template-columns:1fr; } }
.panel-card { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:14px; }
.panel-card h3 { font-size:14px; font-weight:600; margin-bottom:10px; }
.table-wrap { overflow-x:auto; }
table { width:100%; border-collapse:collapse; font-size:12px; }
th { text-align:left; color:var(--text-muted); font-weight:500; padding:6px 8px; border-bottom:1px solid var(--border); white-space:nowrap; }
td { padding:6px 8px; border-bottom:1px solid rgba(30,35,56,0.5); white-space:nowrap; }
tr:hover td { background:var(--bg3); }
.pos-buy { color:var(--green); font-weight:600; }
.pos-sell { color:var(--red); font-weight:600; }
.pnl-pos { font-weight:600; }
.pnl-pos.pos { color:var(--green); }
.pnl-pos.neg { color:var(--red); }
.ticker-wrap { overflow-x:auto; margin-bottom:14px; }
.ticker { display:flex; gap:0; border:1px solid var(--border); border-radius:8px; overflow:hidden; background:var(--card); min-width:fit-content; }
.ticker-item { display:flex; flex-direction:column; align-items:center; padding:6px 12px; border-right:1px solid var(--border); min-width:100px; }
.ticker-item:last-child { border-right:none; }
.ticker-item .sym { font-size:11px; font-weight:600; }
.ticker-item .price { font-size:13px; font-weight:700; margin:1px 0; }
.ticker-item .change { font-size:10px; font-weight:500; }
.ticker-item .change.up { color:var(--green); }
.ticker-item .change.down { color:var(--red); }
.market-summary { display:grid; grid-template-columns:repeat(auto-fit,minmax(80px,1fr)); gap:4px; margin-bottom:14px; }
.ms-item { background:var(--card); border:1px solid var(--border); border-radius:8px; padding:6px; text-align:center; }
.ms-item .ms-sym { font-size:10px; color:var(--text-muted); font-weight:600; }
.ms-item .ms-val { font-size:12px; font-weight:700; margin:1px 0; }
.ms-item .ms-rsi { font-size:9px; }
.ms-item.bull { border-color:var(--green-border); }
.ms-item.bear { border-color:var(--red-border); }
::-webkit-scrollbar { width:4px; height:4px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border-light); border-radius:2px; }
</style>
</head>
<body>
<div class="container">
<div class="header">
  <div class="header-left">
    <h1>Hermes</h1>
    <span class="subtitle">Trading Dashboard</span>
  </div>
  <div class="header-right">
    <span id="acctServer">-</span>
    <span class="update-time" id="updateTime">-</span>
  </div>
</div>
<div class="account-bar" id="accountBar"></div>
<div class="ticker-wrap"><div class="ticker" id="ticker"></div></div>
<div class="main-grid">
  <div class="chart-section">
    <div class="chart-header">
      <div class="pair-selector" id="pairSelector"></div>
      <span id="chartInfo" style="color:var(--text-muted)">H1 Trend: -</span>
    </div>
    <div id="candlestick"></div>
  </div>
  <div class="osc-panels" id="oscPanels"></div>
</div>
<div class="market-summary" id="marketSummary"></div>
<div class="strat-grid">
  <div class="strat-card" id="dayTradeCard">
    <div class="hdr"><h3>📈 Day Trade</h3><span class="badge idle">idle</span></div>
    <div id="dayTradeBody"><div class="stat-row"><span class="lbl">Status</span><span class="val">Menunggu scan...</span></div></div>
  </div>
  <div class="strat-card" id="quantCard">
    <div class="hdr"><h3>⚡ Quant Scalping</h3><span class="badge idle">active</span></div>
    <div id="quantBody"><div class="stat-row"><span class="lbl">Status</span><span class="val">Menunggu data...</span></div></div>
  </div>
</div>
<div class="bottom-grid">
  <div class="panel-card">
    <h3>📊 Open Positions</h3>
    <div class="table-wrap"><table><thead><tr><th>Symbol</th><th>Side</th><th>Lot</th><th>Entry</th><th>Current</th><th>SL</th><th>TP</th><th>Profit</th><th>Time</th></tr></thead><tbody id="posBody"></tbody></table></div>
    <div id="noPos" style="text-align:center;padding:20px;color:var(--text-muted);font-size:13px;">No open positions</div>
  </div>
  <div class="panel-card">
    <h3>📜 Recent Trades</h3>
    <div class="table-wrap"><table><thead><tr><th>Time</th><th>Symbol</th><th>Type</th><th>Lot</th><th>Price</th><th>PnL</th></tr></thead><tbody id="histBody"></tbody></table></div>
    <div id="noHist" style="text-align:center;padding:20px;color:var(--text-muted);font-size:13px;">No trade history</div>
  </div>
</div>
</div>

<script>
let data = null, chart = null, candleSeries = null, volumeSeries = null;
let rsiChart = null, macdChart = null, stochChart = null, currentSymbol = 'EURUSDm';

async function fetchData() {
  try {
    const r = await fetch('/static/dashboard_data.json?v='+Date.now());
    data = await r.json();
    renderAll();
  } catch(e) { console.warn('Fetch fail:',e); }
}

function renderAll() {
  if (!data) return;
  renderAccount(); renderTicker(); renderPairSelector();
  renderChart(); renderOscillators(); renderMarketSummary();
  renderDayTrade(); renderQuant(); renderPositions(); renderHistory();
  document.getElementById('updateTime').textContent = '⏱ '+data.updated_at;
  document.getElementById('acctServer').textContent = data.account?.server || '-';
}

function renderAccount() {
  const a = data.account; if (!a) return;
  document.getElementById('accountBar').innerHTML = `
    <div class="acct-item"><div class="label">Balance</div><div class="value green">$${a.balance.toLocaleString()}</div></div>
    <div class="acct-item"><div class="label">Equity</div><div class="value blue">$${a.equity.toLocaleString()}</div></div>
    <div class="acct-item"><div class="label">Margin</div><div class="value" style="color:var(--yellow)">$${a.margin.toFixed(2)}</div></div>
    <div class="acct-item"><div class="label">Free Margin</div><div class="value">$${a.free_margin.toLocaleString()}</div></div>
    <div class="acct-item"><div class="label">Margin Level</div><div class="value" style="color:var(--cyan)">${a.margin_level<500?'<span style=\"color:orange\">'+a.margin_level+'%</span>':a.margin_level+'%'}</div></div>
    <div class="acct-item"><div class="label">Open PnL</div><div class="value ${a.profit>=0?'green':'red'}">${a.profit>=0?'+':''}$${a.profit.toFixed(2)}</div></div>
    <div class="acct-item"><div class="label">Leverage</div><div class="value" style="color:var(--purple)">1:${a.leverage}</div></div>
    <div class="acct-item"><div class="label">Login</div><div class="value" style="font-size:13px">${a.login}</div></div>`;
}

function renderTicker() {
  const m = data.market||{};
  document.getElementById('ticker').innerHTML = Object.entries(m).map(([sym,info])=>{
    const t = info.trend==='BULLISH'?'🟢':(info.trend==='BEARISH'?'🔴':'⚪');
    const cs = info.candles||[];
    let ch='',cc='';
    if(cs.length>=2){const d=(cs[cs.length-1].close-cs[cs.length-2].close)/cs[cs.length-2].close*100; ch=(d>=0?'+':'')+d.toFixed(2)+'%';cc=d>=0?'up':'down';}
    return '<div class="ticker-item"><span class="sym">'+t+sym+'</span><span class="price">'+info.bid.toFixed(5)+'</span><span class="change '+cc+'">'+ch+'</span></div>';
  }).join('');
}

function renderPairSelector() {
  const m = data.market||{};
  document.getElementById('pairSelector').innerHTML = Object.keys(m).map(s=>'<button class="pair-btn '+(s===currentSymbol?'active':'')+'" onclick="switchPair(\''+s+'\')">'+s+'</button>').join('');
}

function switchPair(sym){currentSymbol=sym;renderPairSelector();renderChart();renderOscillators();}

function renderChart() {
  const mkt = data.market?.[currentSymbol]; if(!mkt) return;
  const tc = mkt.trend==='BULLISH'?'var(--green)':(mkt.trend==='BEARISH'?'var(--red)':'var(--text-muted)');
  document.getElementById('chartInfo').innerHTML = 'H1: <span style="color:'+tc+';font-weight:600">'+mkt.trend+'</span> | RSI: '+mkt.last_rsi+' | Stoch: '+mkt.last_stoch_k;
  if(!chart){
    chart = LightweightCharts.createChart(document.getElementById('candlestick'),{
      layout:{background:{color:'#131620'},textColor:'#787d96'}, grid:{vertLines:{color:'#1a1e2b'},horzLines:{color:'#1a1e2b'}},
      timeScale:{borderColor:'#1e2338',timeVisible:true,secondsVisible:false}, rightPriceScale:{borderColor:'#1e2338'},
    });
    candleSeries = chart.addCandlestickSeries({upColor:'#22c55e',downColor:'#ef4444',borderDownColor:'#ef4444',borderUpColor:'#22c55e',wickDownColor:'#ef4444',wickUpColor:'#22c55e'});
    volumeSeries = chart.addHistogramSeries({priceFormat:{type:'volume'},priceScaleId:'volume'});
    chart.priceScale('volume').applyOptions({scaleMargins:{top:0.85,bottom:0}});
  }
  const cs = mkt.candles||[];
  if(cs.length){candleSeries.setData(cs);volumeSeries.setData(cs.map(c=>({time:c.time,value:c.volume,color:c.close>=c.open?'rgba(34,197,94,0.3)':'rgba(239,68,68,0.3)'})));chart.timeScale().fitContent();}
}

function renderOscillators() {
  const mkt = data.market?.[currentSymbol]; if(!mkt||!(mkt.oscillators||[]).length) return;
  if(rsiChart){rsiChart.destroy();rsiChart=null} if(macdChart){macdChart.destroy();macdChart=null} if(stochChart){stochChart.destroy();stochChart=null}
  const osc = mkt.oscillators;
  document.getElementById('oscPanels').innerHTML = '<div class="osc-panel"><div class="title" style="color:var(--rsi-color)">RSI (7)</div><div class="value" id="rsiVal">'+mkt.last_rsi+'</div><div class="canvas"><canvas id="rsiCanvas"></canvas></div></div><div class="osc-panel"><div class="title" style="color:var(--macd-color)">MACD</div><div class="value" id="macdVal" style="font-size:14px">'+mkt.last_macd.toFixed(4)+'</div><div class="canvas"><canvas id="macdCanvas"></canvas></div></div><div class="osc-panel"><div class="title" style="color:var(--stoch-color)">Stochastic</div><div class="value" id="stochVal">'+mkt.last_stoch_k+'</div><div class="canvas"><canvas id="stochCanvas"></canvas></div></div>';
  const labels = osc.map(o=>{const d=o.time.split('T')[1];return d?d.slice(0,5):'';});
  const rsiCtx = document.getElementById('rsiCanvas');
  if(rsiCtx){
    rsiChart = new Chart(rsiCtx,{type:'line',data:{labels,datasets:[{label:'RSI',data:osc.map(o=>o.rsi),borderColor:'#a855f7',borderWidth:1.5,pointRadius:0,tension:0.3}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{display:false},y:{min:0,max:100,grid:{color:'rgba(255,255,255,0.03)'},ticks:{font:{size:8}}}}}});
    const lr = osc[osc.length-1].rsi; const rv = document.getElementById('rsiVal'); rv.textContent = lr; rv.style.color = lr>70?'var(--red)':(lr<30?'var(--green)':'var(--text)');
  }
  const macdCtx = document.getElementById('macdCanvas');
  if(macdCtx){
    macdChart = new Chart(macdCtx,{type:'bar',data:{labels,datasets:[{label:'Hist',data:osc.map(o=>o.macd_hist),backgroundColor:osc.map(o=>o.macd_hist>=0?'rgba(34,197,94,0.5)':'rgba(239,68,68,0.5)'),borderWidth:0},{label:'MACD',data:osc.map(o=>o.macd),borderColor:'#22d3ee',borderWidth:1.5,pointRadius:0,type:'line',tension:0.3},{label:'Signal',data:osc.map(o=>o.macd_signal),borderColor:'#f97316',borderWidth:1,pointRadius:0,type:'line',tension:0.3}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{display:false},y:{grid:{color:'rgba(255,255,255,0.03)'},ticks:{font:{size:8}}}}}});
  }
  const stochCtx = document.getElementById('stochCanvas');
  if(stochCtx){
    stochChart = new Chart(stochCtx,{type:'line',data:{labels,datasets:[{label:'%K',data:osc.map(o=>o.stoch_k),borderColor:'#f97316',borderWidth:1.5,pointRadius:0,tension:0.3},{label:'%D',data:osc.map(o=>o.stoch_d),borderColor:'#eab308',borderWidth:1,pointRadius:0,tension:0.3,borderDash:[3,3]}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{display:false},y:{min:0,max:100,grid:{color:'rgba(255,255,255,0.03)'},ticks:{font:{size:8}}}}}});
    const sk = osc[osc.length-1].stoch_k; const sv = document.getElementById('stochVal'); sv.textContent = sk; sv.style.color = sk>80?'var(--red)':(sk<20?'var(--green)':'var(--text)');
  }
}

function renderMarketSummary() {
  const m = data.market||{};
  const cls = {'BULLISH':'bull','BEARISH':'bear'};
  document.getElementById('marketSummary').innerHTML = Object.entries(m).map(([sym,info])=>'<div class="ms-item '+(cls[info.trend]||'')+'"><div class="ms-sym">'+sym.replace('m','')+'</div><div class="ms-val" style="color:'+(pairColors[sym]||'var(--text)')+'">'+info.bid.toFixed(info.bid<10?5:4)+'</div><div class="ms-rsi" style="color:var(--rsi-color)">RSI '+info.last_rsi+'</div><div class="ms-rsi" style="color:var(--stoch-color)">St '+info.last_stoch_k+'</div></div>').join('');
}
const pairColors = {'EURUSDm':'#3b82f6','GBPUSDm':'#22d3ee','USDJPYm':'#eab308','USDCHFm':'#a855f7','USDCADm':'#f97316','AUDUSDm':'#22c55e','NZDUSDm':'#ef4444','XAUUSDm':'#f59e0b'};

function renderDayTrade() {
  const dt = data.day_trade||{};
  const card = document.getElementById('dayTradeCard');
  const body = document.getElementById('dayTradeBody');
  const badge = card.querySelector('.badge');
  if(dt.status==='active'){
    badge.textContent = dt.decision; badge.className = 'badge '+(dt.decision==='WAIT'?'idle':'active');
    body.innerHTML = '<div class="stat-row"><span class="lbl">Decision</span><span class="val" style="color:'+(dt.decision==='BUY'?'var(--green)':(dt.decision==='SELL'?'var(--red)':'var(--text)'))+'">'+dt.decision+'</span></div><div class="stat-row"><span class="lbl">Symbol</span><span class="val">'+(dt.symbol||'-')+'</span></div><div class="stat-row"><span class="lbl">Side</span><span class="val">'+(dt.side||'-')+'</span></div><div class="stat-row"><span class="lbl">Confidence</span><span class="val">'+(dt.confidence||0)+'/100</span></div><div class="stat-row"><span class="lbl">RR</span><span class="val">'+(dt.rr||0)+'</span></div>';
  } else {
    badge.textContent='idle'; body.innerHTML = '<div class="stat-row"><span class="lbl">Status</span><span class="val">Menunggu scan</span></div><div class="stat-row"><span class="lbl">Last Scan</span><span class="val">'+(dt.last_scan||'-')+'</span></div>';
  }
}

function renderQuant() {
  const q = data.quant||{};
  document.getElementById('quantBody').innerHTML = '<div class="stat-row"><span class="lbl">Trades Today</span><span class="val" style="color:var(--cyan);font-weight:700">'+(q.trades_today||0)+'</span></div><div class="stat-row"><span class="lbl">PnL Today</span><span class="val '+( (q.pnl_today||0)>=0?'green':'red')+'">'+((q.pnl_today||0)>=0?'+':'')+'$'+(q.pnl_today||0).toFixed(2)+'</span></div><div class="stat-row"><span class="lbl">Learner WR</span><span class="val" style="color:'+((q.learner_wr||0)>=50?'var(--green)':'var(--red)')+'">'+(q.learner_wr||0)+'%</span></div><div class="stat-row"><span class="lbl">Scanner</span><span class="val" style="font-size:11px">15m cycle</span></div>';
}

function renderPositions() {
  const pos = data.positions||[];
  document.getElementById('posBody').innerHTML = pos.length?pos.map(p=>'<tr><td style="font-weight:600">'+p.symbol+'</td><td class="pos-'+p.type.toLowerCase()+'">'+p.type+'</td><td>'+p.volume.toFixed(2)+'</td><td>'+p.open_price.toFixed(5)+'</td><td>'+p.current_price.toFixed(5)+'</td><td>'+(p.sl?p.sl.toFixed(5):'-')+'</td><td>'+(p.tp?p.tp.toFixed(5):'-')+'</td><td class="pnl-pos '+(p.profit>=0?'pos':'neg')+'">'+(p.profit>=0?'+':'')+'$'+p.profit.toFixed(2)+'</td><td style="font-size:11px;color:var(--text-muted)">'+p.time+'</td></tr>'):'';
  document.getElementById('noPos').style.display = pos.length?'none':'block';
}

function renderHistory() {
  const hist = data.history||[];
  document.getElementById('histBody').innerHTML = hist.length?hist.map(h=>'<tr><td style="font-size:11px;color:var(--text-muted)">'+h.time+'</td><td style="font-weight:600">'+h.symbol+'</td><td class="pos-'+h.type.toLowerCase()+'">'+h.type+'</td><td>'+(h.volume||0).toFixed(2)+'</td><td>'+(h.price||0).toFixed(5)+'</td><td class="pnl-pos '+( (h.profit||0)>=0?'pos':'neg')+'">'+( (h.profit||0)>=0?'+':'')+'$'+(h.profit||0).toFixed(2)+'</td></tr>'):'';
  document.getElementById('noHist').style.display = hist.length?'none':'block';
}

fetchData(); setInterval(fetchData, 15000);
window.addEventListener('resize',()=>{if(chart)chart.applyOptions({width:document.getElementById('candlestick').clientWidth});});
</script>
