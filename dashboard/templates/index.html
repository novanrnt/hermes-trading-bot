<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Hermes Trading Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Inter,sans-serif;background:#0d0e12;color:#e2e6f0;overflow-x:hidden}
.container{max-width:1400px;margin:0 auto;padding:8px}
@media(min-width:768px){.container{padding:12px}}
h1{font-size:18px;background:linear-gradient(135deg,#3b82f6,#22d3ee);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header{display:flex;justify-content:space-between;align-items:center;padding:8px 0;font-size:11px;color:#787d96}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-bottom:10px}
.grid-2{display:grid;gap:8px;margin-bottom:10px}
@media(min-width:600px){.grid-2{grid-template-columns:1fr 1fr}}
.card{background:#161a25;border:1px solid #1e2338;border-radius:8px;padding:10px;margin-bottom:8px}
.card-sm{padding:6px;text-align:center}
.card-sm .lbl{font-size:9px;color:#555a75;text-transform:uppercase}
.card-sm .val{font-size:14px;font-weight:700;margin:2px 0}
.green{color:#22c55e}.red{color:#ef4444}.blue{color:#3b82f6}.cyan{color:#22d3ee}.yellow{color:#eab308}.purple{color:#a855f7}
table{width:100%;border-collapse:collapse;font-size:11px;white-space:nowrap}
th{color:#555a75;font-weight:500;padding:5px 6px;border-bottom:1px solid #1e2338;text-align:left}
td{padding:5px 6px;border-bottom:1px solid rgba(30,35,56,0.5)}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:#292e45;border-radius:2px}
.section-title{font-size:13px;font-weight:600;margin-bottom:6px;color:#787d96}
.symbol-badge{font-size:10px;padding:2px 6px;border-radius:3px;font-weight:600;display:inline-block}
.trend-up{color:#22c55e}.trend-down{color:#ef4444}
.pair-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:3px;margin-bottom:8px}
@media(min-width:600px){.pair-grid{grid-template-columns:repeat(8,1fr)}}
.osc-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;margin-bottom:8px}
.osc-item{background:#161a25;border:1px solid #1e2338;border-radius:6px;padding:6px;text-align:center}
.osc-item .label{font-size:9px;color:#555a75;margin-bottom:1px}
.osc-item .value{font-size:16px;font-weight:700}
.strat{background:#161a25;border:1px solid #1e2338;border-radius:8px;padding:10px;margin-bottom:8px}
.strat .hdr{display:flex;justify-content:space-between;margin-bottom:6px;font-size:13px;font-weight:600}
.strat-row{display:flex;justify-content:space-between;font-size:11px;padding:3px 0;border-bottom:1px solid #1e2338}
.strat-row:last-child{border:none}
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
</style>
</head>
<body>
<div class="container">

<div class="header">
  <h1>Hermes Trading</h1>
  <div id="updateTime">Loading...</div>
</div>

<!-- Account -->
<div class="grid-4" id="accountBar">Loading...</div>

<!-- Pairs Ticker -->
<div class="card-sm" id="pairTicker" style="overflow-x:auto;white-space:nowrap;padding:6px">Loading...</div>

<!-- Oscillators -->
<div class="osc-row" id="oscillators">Loading...</div>

<!-- Market Summary -->
<div class="pair-grid" id="marketSummary">Loading...</div>

<!-- Strategies -->
<div class="grid-2">
  <div class="strat" id="dayTradeCard">
    <div class="hdr"><span>📈 Day Trade</span><span id="dayBadge" class="symbol-badge">idle</span></div>
    <div id="dayBody">Loading...</div>
  </div>
  <div class="strat" id="quantCard">
    <div class="hdr"><span>⚡ Quant Scalping</span></div>
    <div id="quantBody">Loading...</div>
  </div>
</div>

<!-- Positions -->
<div class="card">
  <div class="section-title">📊 Open Positions</div>
  <div class="table-wrap" id="posTable"></div>
  <div id="noPos" style="padding:12px;text-align:center;color:#555a75;font-size:12px">Loading...</div>
</div>

<!-- History -->
<div class="card">
  <div class="section-title">📜 Recent Trades</div>
  <div class="table-wrap" id="histTable"></div>
  <div id="noHist" style="padding:12px;text-align:center;color:#555a75;font-size:12px">Loading...</div>
</div>

</div>

<script>
// Load data from server-generated JSON
fetch('/dashboard_data.json?v='+Date.now()).then(r=>r.json()).then(d=>{
  // Account
  const a=d.account;
  document.getElementById('accountBar').innerHTML=
    '<div class="card-sm"><div class="lbl">Balance</div><div class="val green">$'+a.balance.toLocaleString()+'</div></div>'+
    '<div class="card-sm"><div class="lbl">Equity</div><div class="val blue">$'+a.equity.toLocaleString()+'</div></div>'+
    '<div class="card-sm"><div class="lbl">Free</div><div class="val">$'+a.free_margin.toLocaleString()+'</div></div>'+
    '<div class="card-sm"><div class="lbl">PnL</div><div class="val '+(a.profit>=0?'green':'red')+'">'+(a.profit>=0?'+':'')+'$'+a.profit.toFixed(2)+'</div></div>';

  document.getElementById('updateTime').textContent=d.updated_at;

  // Ticker
  const m=d.market||{};
  const tkr=Object.entries(m).map(([s,info])=>{
    const tr=info.trend||'NEUTRAL';
    const icon=tr==='BULLISH'?'🟢':(tr==='BEARISH'?'🔴':'⚪');
    return '<span style="display:inline-block;margin:0 8px;font-size:11px">'+icon+s.replace('m','')+' <b>'+info.bid.toFixed(s.includes('XAU')?2:5)+'</b></span>';
  }).join('|');
  document.getElementById('pairTicker').innerHTML=tkr;

  // Oscillators
  const em=m['EURUSDm']||{};
  const eo=em.oscillators||[];
  const lr=eo.length?eo[eo.length-1].rsi:50;
  const lm=eo.length?eo[eo.length-1].macd:0;
  const lk=eo.length?eo[eo.length-1].stoch_k:50;
  document.getElementById('oscillators').innerHTML=
    '<div class="osc-item"><div class="label">RSI(7)</div><div class="value" style="color:'+(lr>70?'#ef4444':(lr<30?'#22c55e':'#e2e6f0'))+'">'+lr+'</div></div>'+
    '<div class="osc-item"><div class="label">MACD</div><div class="value" style="font-size:13px;color:#22d3ee">'+lm.toFixed(4)+'</div></div>'+
    '<div class="osc-item"><div class="label">Stoch</div><div class="value" style="color:'+(lk>80?'#ef4444':(lk<20?'#22c55e':'#e2e6f0'))+'">'+lk+'</div></div>';

  // Market summary per pair
  document.getElementById('marketSummary').innerHTML=Object.entries(m).map(([s,info])=>{
    const t=info.trend||'NEUTRAL';
    const cl=t==='BULLISH'?'#22c55e':(t==='BEARISH'?'#ef4444':'#787d96');
    return '<div style="background:#161a25;border:1px solid #1e2338;border-radius:6px;padding:5px;text-align:center;border-left:3px solid '+cl+'"><div style="font-size:10px;color:#555a75;font-weight:600">'+s.replace('m','')+'</div><div style="font-size:12px;font-weight:700">'+info.bid.toFixed(s.includes('XAU')?2:5)+'</div><div style="font-size:9px;color:'+cl+'">'+t+'</div></div>';
  }).join('');

  // Day Trade
  const dt=d.day_trade||{};
  const db=document.getElementById('dayBadge');
  const dbody=document.getElementById('dayBody');
  if(dt.status==='active'){
    db.textContent=dt.decision;
    db.style.background=dt.decision==='WAIT'?'transparent':'rgba(34,197,94,0.1)';
    dbody.innerHTML='<div class="strat-row"><span>Decision</span><span style="color:'+(dt.decision==='BUY'?'#22c55e':(dt.decision==='SELL'?'#ef4444':'#e2e6f0'))+';font-weight:600">'+dt.decision+'</span></div>'+
      '<div class="strat-row"><span>Symbol</span><span>'+dt.symbol+'</span></div>'+
      '<div class="strat-row"><span>Side</span><span>'+dt.side+'</span></div>'+
      '<div class="strat-row"><span>Confidence</span><span>'+dt.confidence+'%</span></div>'+
      '<div class="strat-row"><span>RR</span><span>1:'+dt.rr+'</span></div>';
  } else { dbody.innerHTML='<div class="strat-row"><span>Status</span><span>Idle</span></div>'; }

  // Quant
  const q=d.quant||{};
  document.getElementById('quantBody').innerHTML=
    '<div class="strat-row"><span>Trades Today</span><span style="font-weight:700;color:#22d3ee">'+(q.trades_today||0)+'</span></div>'+
    '<div class="strat-row"><span>PnL Today</span><span style="color:'+((q.pnl_today||0)>=0?'#22c55e':'#ef4444')+'">'+((q.pnl_today||0)>=0?'+':'')+'$'+(q.pnl_today||0).toFixed(2)+'</span></div>'+
    '<div class="strat-row"><span>WR</span><span style="color:'+((q.learner_wr||0)>=50?'#22c55e':'#ef4444')+'">'+(q.learner_wr||0)+'%</span></div>';

  // Positions
  const pos=d.positions||[];
  if(pos.length){
    document.getElementById('noPos').style.display='none';
    document.getElementById('posTable').innerHTML='<table><thead><tr><th>Sym</th><th>Side</th><th>Lot</th><th>Entry</th><th>Curr</th><th>PnL</th></tr></thead><tbody>'+pos.map(p=>'<tr><td style="font-weight:600">'+p.symbol.replace('m','')+'</td><td style="color:'+(p.type==='BUY'?'#22c55e':'#ef4444')+';font-weight:600">'+p.type[0]+'</td><td>'+p.volume.toFixed(2)+'</td><td>'+p.open_price.toFixed(5)+'</td><td>'+p.current_price.toFixed(5)+'</td><td style="font-weight:600;color:'+(p.profit>=0?'#22c55e':'#ef4444')+'">'+(p.profit>=0?'+':'')+'$'+p.profit.toFixed(2)+'</td></tr>').join('')+'</tbody></table>';
  } else {
    document.getElementById('noPos').style.display='block';
    document.getElementById('noPos').textContent='No open positions';
  }

  // History
  const hist=d.history||[];
  if(hist.length){
    document.getElementById('noHist').style.display='none';
    document.getElementById('histTable').innerHTML='<table><thead><tr><th>Time</th><th>Sym</th><th>T</th><th>Lot</th><th>Price</th><th>PnL</th></tr></thead><tbody>'+hist.slice(0,15).map(h=>'<tr><td style="color:#555a75">'+h.time+'</td><td style="font-weight:600">'+h.symbol.replace('m','')+'</td><td style="color:'+(h.type==='BUY'?'#22c55e':'#ef4444')+'">'+h.type[0]+'</td><td>'+(h.volume||0).toFixed(2)+'</td><td>'+(h.price||0).toFixed(5)+'</td><td style="font-weight:600;color:'+((h.profit||0)>=0?'#22c55e':'#ef4444')+'">'+((h.profit||0)>=0?'+':'')+'$'+(h.profit||0).toFixed(2)+'</td></tr>').join('')+'</tbody></table>';
  } else {
    document.getElementById('noHist').style.display='block';
    document.getElementById('noHist').textContent='No trade history';
  }

}).catch(e=>{
  document.body.innerHTML='<div style="padding:20px;text-align:center"><h2>No Dashboard Data</h2><p style="color:#787d96;margin-top:8px">Data provider belum jalan. Coba refresh dalam 1 menit.</p><p style="color:#555a75;margin-top:4px;font-size:11px">'+e.message+'</p></div>';
});
</script>
</body>
</html>
